<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul">

  <head>
    <meta charset="utf-8" />
    <title>Account Hub Email Manual Config Form Test</title>
    <link rel="stylesheet" href="chrome://messenger/skin/icons.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/colors.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/spacings.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/accountHub.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/accountHubForms.css" />
    <link rel="localization" href="messenger/accountcreation/accountHub.ftl" />
    <script type="module" src="chrome://messenger/content/accountcreation/content/widgets/email-manual-config-form.mjs"></script>
  </head>

  <body>
    <template id="accountHubHeaderTemplate">
      <header id="accountHubHeader" class="hub-header">
        <div id="brandingHeader" class="branding-header" hidden="hidden">
          <img src="chrome://branding/content/logo-gradient.svg" alt="" />
          <h1 class="account-hub-title">
            <span class="branding-header-name" aria-hidden="hidden"></span>
            <span class="branding-header-title" aria-hidden="hidden"></span>
            <span class="account-hub-welcome-text screen-reader-only" data-l10n-id="account-hub-welcome-text"></span>
          </h1>
          <div id="headerButtonsContainer">
            <button id="minimizeButton" class="button button-flat button-round icon-button icon-only modal-close-button"
              data-l10n-id="account-hub-minimize-button" type="button">
              <img class="icon-minimize" src="" alt="" />
            </button>
            <button id="closeButton" class="button button-flat button-round icon-button icon-only modal-close-button"
              data-l10n-id="account-hub-close-button" type="button">
              <img class="icon-close-lg" src="" alt="" />
            </button>
          </div>
        </div>
        <slot name="middle-content"></slot>
        <h1 id="accountHubHeaderTitle" class="sub-view-title">
          <slot name="title"></slot>
        </h1>
        <h2 id="accountHubHeaderSubheader" class="sub-view-sub-header" hidden="hidden">
          <slot name="subheader"></slot>
        </h2>
        <details id="emailFormNotification" class="notification-bar">
          <summary id="emailFormNotificationSummary" class="notification-title-container" role="alert">
            <img class="form-icon icon-warning" src="" alt="" />
            <img class="form-icon icon-success" src="" alt="" />
            <img class="form-icon icon-info" src="" alt="" />
            <img class="form-icon icon-danger" src="" alt="" />
            <p id="emailFormNotificationTitle" class="notification-title">
              <span class="localized-title"></span>
              <span class="raw-title"></span>
            </p>
            <div id="emailFormNotificationToggle">
              <span data-l10n-id="account-hub-notification-show-more"></span>
              <span data-l10n-id="account-hub-notification-show-less"></span>
            </div>
          </summary>
          <p id="emailFormNotificationText" class="notification-text">
            <span class="localized-description"></span>
            <span class="raw-description"></span>
          </p>
        </details>
      </header>
    </template>
    <template id="accountHubStepTemplate">
      <account-hub-header>
        <span id="title" slot="title">
        </span>
        <span id="subheader" slot="subheader">
        </span>
      </account-hub-header>
      <div class="account-hub-grid">
        <slot name="content"></slot>
      </div>
    </template>
    <template id="accountHubInputTemplate">
      <label></label>
      <div class="input-control">
        <input aria-invalid="false" />
        <img src="" alt="" class="form-icon icon-danger input-warning" />
        <img src="" alt="" class="form-icon icon-success input-success" />
        <span class="input-error-message"></span>
      </div>
    </template>
    <template id="accountHubSelectTemplate">
      <label>
      </label>
      <div class="input-control">
        <select
          class="menulist"
          flex="1">
        </select>
        <p id="securityWarning" class="input-error-message">
          <span data-l10n-name="error-text"></span>
          <a class="more-info-link" data-l10n-name="error-link"></a>
        </p>
        <slot hidden="hidden"></slot>
      </div>
    </template>
    <template id="accountHubEmailManualConfigFormTemplate">
      <form
        id="manualConfigForm"
        class="account-hub-form"
        slot="content"
      >
        <div class="hub-body manual-config-body">
          <fieldset
            class="manual-config-server-fields"
            aria-labelledby="manualIncomingConfigLegend"
          >
            <h2
              id="manualIncomingConfigLegend"
              class="manual-config-server-header"
              data-l10n-id="account-hub-manual-config-incoming-legend"
            ></h2>
            <!-- Incoming Hostname -->
            <account-hub-input
              id="manualIncomingHostname"
              l10n-label-id="account-hub-result-hostname-label"
              l10n-error-id="account-hub-hostname-error-text"
              type="text"
              placeholder="mail.example.com"
              required="required"
              classes="input-field manual-input"
            ></account-hub-input>

            <!-- Incoming Username -->
            <account-hub-input
              id="manualIncomingUsername"
              l10n-label-id="account-hub-result-username-label"
              l10n-error-id="account-hub-username-error-text"
              type="text"
              required="required"
              classes="username input-field manual-input"
            ></account-hub-input>

            <!-- Incoming Authentication -->
            <account-hub-select
              id="manualIncomingAuthMethod"
              l10n-label-id="account-hub-auth-label"
              required="required"
              value="0"
              flex="1"
            >
              <option
                id="manualIncomingAuthMethodAutodetect"
                data-l10n-id="account-hub-ssl-autodetect-option"
                value="0"
              ></option>
              <option
                id="manualIncomingAuthMethodCleartext"
                data-l10n-id="account-hub-ssl-cleartext-password-option"
                value="3"
              ></option>
              <option
                id="manualIncomingAuthMethodEncrypted"
                data-l10n-id="account-hub-ssl-encrypted-password-option"
                value="4"
              ></option>
              <option
                id="manualIncomingAuthMethodKerbos"
                label="Kerberos / GSSAPI"
                value="5"
              ></option>
              <option
                id="manualIncomingAuthMethodNtlm"
                label="NTLM"
                value="6"
              ></option>
              <option
                id="manualIncomingAuthMethodOAuth2"
                value="10"
                hidden="hidden"
                label="OAuth2"
              ></option>
            </account-hub-select>

            <!-- Incoming Connection Security -->
            <account-hub-select
              id="manualIncomingConnectionSecurity"
              l10n-label-id="account-hub-ssl-label"
              l10n-error-id="account-hub-select-security-warning"
              flex="1"
            >
              <option
                id="manualIncomingConnectionSecurityAutodetect"
                data-l10n-id="account-hub-ssl-autodetect-option"
                value="-1"
              ></option>
              <option
                id="manualIncomingConnectionSecurityNoEncryption"
                selected="true"
                data-l10n-id="account-hub-ssl-noencryption-option"
                value="0"
              ></option>
              <option
                id="manualIncomingConnectionSecurityStartTtls"
                label="STARTTLS"
                value="2"
              ></option>
              <option
                id="manualIncomingConnectionSecuritySslTls"
                label="SSL/TLS"
                value="3"
              ></option>
            </account-hub-select>

            <!-- Incoming Port -->
            <account-hub-input
              id="manualIncomingPort"
              l10n-label-id="account-hub-on-port-label"
              l10n-error-id="account-hub-port-error-text"
              type="number"
              min="1"
              max="65535"
              placeholder="993"
              required="required"
              classes="input-field number-input"
            ></account-hub-input>
          </fieldset>
          <fieldset
            class="manual-config-server-fields"
            aria-labelledby="manualOutgoingConfigLegend"
          >
            <h2
              id="manualOutgoingConfigLegend"
              class="manual-config-server-header"
              data-l10n-id="account-hub-manual-config-outgoing-legend"
            ></h2>

            <!-- Outgoing Hostname -->
            <account-hub-input
              id="manualOutgoingHostname"
              l10n-label-id="account-hub-result-hostname-label"
              l10n-error-id="account-hub-hostname-error-text"
              type="text"
              placeholder="mail.example.com"
              required="required"
              classes="input-field manual-input"
            ></account-hub-input>

            <!-- Outgoing Username -->
            <account-hub-input
              id="manualOutgoingUsername"
              l10n-label-id="account-hub-result-username-label"
              l10n-error-id="account-hub-username-error-text"
              type="text"
              required="required"
              classes="username input-field manual-input"
            ></account-hub-input>

            <!-- Outgoing Authentication -->
            <account-hub-select
              id="manualOutgoingAuthMethod"
              l10n-label-id="account-hub-auth-label"
              required="required"
              flex="1"
            >
              <option
                id="manualOutgoingAuthMethodAutodetect"
                data-l10n-id="account-hub-ssl-autodetect-option"
                selected="selected"
                value="0"
              ></option>
              <option
                id="manualOutgoingAuthMethodNone"
                data-l10n-id="account-hub-auth-no-authentication-option"
                value="1"
              ></option>
              <option
                id="manualOutgoingAuthMethodCleartext"
                data-l10n-id="account-hub-ssl-cleartext-password-option"
                value="3"
              ></option>
              <option
                id="manualOutgoingAuthMethodEncrypted"
                data-l10n-id="account-hub-ssl-encrypted-password-option"
                value="4"
              ></option>
              <option
                id="manualOutgoingAuthMethodKerbos"
                label="Kerberos / GSSAPI"
                value="5"
              ></option>
              <option
                id="manualOutgoingAuthMethodNtlm"
                label="NTLM"
                value="6"
              ></option>
              <option
                id="manualOutgoingAuthMethodOAuth2"
                value="10"
                hidden="hidden"
                label="OAuth2"
              ></option>
            </account-hub-select>

            <!-- Outgoing Connection Security -->
            <account-hub-select
              id="manualOutgoingConnectionSecurity"
              l10n-label-id="account-hub-ssl-label"
              l10n-error-id="account-hub-select-security-warning"
              flex="1"
            >
              <option
                id="manualOutgoingConnectionSecurityAutodetect"
                data-l10n-id="account-hub-ssl-autodetect-option"
                value="-1"
              ></option>
              <option
                id="manualOutgoingConnectionSecurityNoEncryption"
                selected="selected"
                data-l10n-id="account-hub-ssl-noencryption-option"
                value="0"
              ></option>
              <option
                id="manualOutgoingConnectionSecurityStartTtls"
                label="STARTTLS"
                value="2"
              ></option>
              <option
                id="manualOutgoingConnectionSecuritySslTls"
                label="SSL/TLS"
                value="3"
              ></option>
            </account-hub-select>

            <!-- Outgoing Port -->
            <account-hub-input
              id="manualOutgoingPort"
              l10n-label-id="account-hub-on-port-label"
              l10n-error-id="account-hub-port-error-text"
              type="number"
              min="1"
              max="65535"
              placeholder="465"
              required="required"
              classes="input-field number-input"
            ></account-hub-input>
          </fieldset>
        </div>
      </form>
    </template>
    <email-manual-config-form></email-manual-config-form>
  </body>
</html>
