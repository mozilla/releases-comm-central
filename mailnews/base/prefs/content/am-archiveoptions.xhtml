<!DOCTYPE html>
<html
  id="archiveOptions"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  style="width: 500px"
  scrolling="false"
>
  <head>
    <title data-l10n-id="archive-options-title"></title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src chrome:; script-src chrome: 'unsafe-inline' moz-src:; style-src chrome: 'unsafe-inline'"
    />
    <link rel="stylesheet" href="chrome://messenger/skin/accountManage.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/folderPane.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/icons.css" />
    <link
      rel="stylesheet"
      href="chrome://messenger/skin/shared/tree-listbox.css"
    />
    <link
      rel="stylesheet"
      href="chrome://messenger/skin/shared/list-container.css"
    />

    <link
      rel="localization"
      href="messenger/preferences/am-archiveoptions.ftl"
    />
    <script
      defer="defer"
      src="chrome://messenger/content/am-archiveoptions.js"
    ></script>
  </head>
  <html:body
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  >
    <dialog style="width: 100vw; height: 100vh">
      <vbox flex="1">
        <label data-l10n-id="archive-granularity-prefix-label"></label>
        <radiogroup id="archiveGranularity">
          <radio data-l10n-id="archive-flat" class="indent" />
          <radio data-l10n-id="archive-yearly" class="indent" />
          <radio data-l10n-id="archive-monthly" class="indent" />
        </radiogroup>
        <checkbox
          id="archiveKeepFolderStructure"
          data-l10n-id="keep-folder-structure"
        />
        <checkbox
          class="indent"
          id="archiveRecreateInbox"
          data-l10n-id="recreate-inbox"
        />
        <fieldset xmlns="http://www.w3.org/1999/xhtml">
          <!-- This is a simulation of the folder tree. It's meant to look
             - like the folder tree, but not behave like it. -->
          <legend data-l10n-id="archive-example-label"></legend>
          <div>
            <ul id="archiveTree" role="tree" flex="1">
              <li class="root">
                <div class="container">
                  <div class="twisty">
                    <img
                      class="twisty-icon"
                      src="chrome://global/skin/icons/arrow-down-12.svg"
                      alt=""
                    />
                  </div>
                  <img class="icon" />
                  <span class="name" data-l10n-id="archive-folder-name2"></span>
                </div>
                <ul>
                  <li id="inboxFolder">
                    <div class="container">
                      <div class="twisty">
                        <img
                          class="twisty-icon"
                          src="chrome://global/skin/icons/arrow-down-12.svg"
                          alt=""
                        />
                      </div>
                      <img class="icon" />
                      <span
                        class="name"
                        data-l10n-id="inbox-folder-name2"
                      ></span>
                    </div>
                    <ul></ul>
                  </li>
                  <li id="childFolder">
                    <div class="container">
                      <div class="twisty">
                        <img
                          class="twisty-icon"
                          src="chrome://global/skin/icons/arrow-down-12.svg"
                          alt=""
                        />
                      </div>
                      <img class="icon" />
                      <span
                        class="name"
                        data-l10n-id="child-folder-name2"
                      ></span>
                    </div>
                  </li>
                  <li id="siblingFolder">
                    <div class="container">
                      <div class="twisty">
                        <img
                          class="twisty-icon"
                          src="chrome://global/skin/icons/arrow-down-12.svg"
                          alt=""
                        />
                      </div>
                      <img class="icon" />
                      <span
                        class="name"
                        data-l10n-id="sibling-folder-name2"
                      ></span>
                    </div>
                  </li>
                  <li class="year">
                    <div class="container">
                      <div class="twisty">
                        <img
                          class="twisty-icon"
                          src="chrome://global/skin/icons/arrow-down-12.svg"
                          alt=""
                        />
                      </div>
                      <img class="icon" />
                      <span class="name">2020</span>
                    </div>
                    <ul>
                      <li class="month">
                        <div class="container">
                          <div class="twisty">
                            <img
                              class="twisty-icon"
                              src="chrome://global/skin/icons/arrow-down-12.svg"
                              alt=""
                            />
                          </div>
                          <img class="icon" />
                          <span class="name">2020-11</span>
                        </div>
                        <ul></ul>
                      </li>
                      <li class="month">
                        <div class="container">
                          <div class="twisty">
                            <img
                              class="twisty-icon"
                              src="chrome://global/skin/icons/arrow-down-12.svg"
                              alt=""
                            />
                          </div>
                          <img class="icon" />
                          <span class="name">2020-12</span>
                        </div>
                        <ul></ul>
                      </li>
                    </ul>
                  </li>
                  <li class="year">
                    <div class="container">
                      <div class="twisty">
                        <img
                          class="twisty-icon"
                          src="chrome://global/skin/icons/arrow-down-12.svg"
                          alt=""
                        />
                      </div>
                      <img class="icon" />
                      <span class="name">2021</span>
                    </div>
                    <ul>
                      <li class="month">
                        <div class="container">
                          <div class="twisty">
                            <img
                              class="twisty-icon"
                              src="chrome://global/skin/icons/arrow-down-12.svg"
                              alt=""
                            />
                          </div>
                          <img class="icon" />
                          <span class="name">2021-01</span>
                        </div>
                        <ul></ul>
                      </li>
                      <li class="month">
                        <div class="container">
                          <div class="twisty">
                            <img
                              class="twisty-icon"
                              src="chrome://global/skin/icons/arrow-down-12.svg"
                              alt=""
                            />
                          </div>
                          <img class="icon" />
                          <span class="name">2021-02</span>
                        </div>
                        <ul></ul>
                      </li>
                    </ul>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </fieldset>
      </vbox>
    </dialog>
  </html:body>
</html>
