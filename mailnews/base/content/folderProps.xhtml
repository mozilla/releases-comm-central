<!DOCTYPE html SYSTEM "chrome://messenger/locale/folderProps.dtd">
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  lightweightthemes="true"
  scrolling="false"
>
  <head>
    <title>&folderProps.windowtitle.label;</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src chrome:; script-src chrome: 'unsafe-inline' moz-src:"
    />
    <link rel="stylesheet" href="chrome://global/skin/global.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/messenger.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/input-fields.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/themeableDialog.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/folderProps.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/colors.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/folderColors.css" />
    <link rel="stylesheet" href="chrome://messenger/skin/retention.css" />
    <link rel="localization" href="messenger/folderprops.ftl" />
    <link rel="localization" href="messenger/retention.ftl" />
    <script
      defer="defer"
      src="chrome://messenger/content/globalOverlay.js"
    ></script>
    <script
      defer="defer"
      src="chrome://global/content/editMenuOverlay.js"
    ></script>
    <script
      defer="defer"
      src="chrome://messenger/content/dialogShadowDom.js"
    ></script>
    <script
      defer="defer"
      src="chrome://messenger/content/folderProps.js"
    ></script>
  </head>
  <html:body
    xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  >
    <dialog id="folderPropertiesDialog">
      <tabbox id="folderPropTabBox">
        <tabs id="folderPropTabs">
          <tab id="GeneralTab" label="&generalInfo.label;" />
          <tab id="Retention" data-l10n-id="retention-tab" />
          <tab
            id="SynchronizationTab"
            hidefor="pop3,rss,none"
            label="&folderSynchronizationTab.label;"
          />
          <tab
            id="SharingTab"
            hidefor="pop3,rss,none,nntp,ews"
            label="&folderSharingTab.label;"
          />
          <tab
            id="QuotaTab"
            hidefor="pop3,rss,none,nntp,ews"
            label="&folderQuotaTab.label;"
          />
        </tabs>
        <tabpanels id="folderPropTabPanels">
          <vbox id="GeneralPanel">
            <hbox id="nameBox" align="center" class="input-container">
              <label
                id="nameLabel"
                value="&folderProps.name.label;"
                control="name"
                accesskey="&folderProps.name.accesskey;"
              />
              <hbox align="center" class="input-container">
                <html:input
                  id="name"
                  type="text"
                  readonly="readonly"
                  oninput="doEnabling()"
                  class="input-inline"
                  aria-labelledby="nameLabel"
                />
                <label
                  id="colorLabel"
                  value="&folderProps.color.label;"
                  control="color"
                  accesskey="&folderProps.color.accesskey;"
                />
                <html:input
                  id="color"
                  type="color"
                  value=""
                  class="input-inline-color"
                  aria-labelledby="colorLabel"
                />
                <button
                  id="resetColor"
                  tooltiptext="&folderProps.reset.tooltip;"
                  class="toolbarbutton-1 btn-flat btn-reset"
                />
              </hbox>
              <label
                id="locationLabel"
                value="&folderProps.location.label;"
                control="location"
                accesskey="&folderProps.location.accesskey;"
              />
              <html:input
                id="location"
                type="text"
                readonly="readonly"
                class="uri-element input-inline"
                aria-labelledby="locationLabel"
              />
            </hbox>
            <vbox>
              <spacer height="2" />
              <hbox align="center">
                <label value="&numberOfMessages.label;" />
                <label id="numberOfMessages" value="&numberUnknown.label;" />
                <spacer flex="1" />
                <label value="&sizeOnDisk.label;" />
                <label id="sizeOnDisk" value="&sizeUnknown.label;" />
              </hbox>
              <spacer height="2" />
            </vbox>
            <checkbox
              id="folderIncludeInGlobalSearch"
              hidefor="nntp"
              label="&folderIncludeInGlobalSearch.label;"
              accesskey="&folderIncludeInGlobalSearch.accesskey;"
            />
            <checkbox
              hidefor="pop3,none,nntp"
              id="folderCheckForNewMessages"
              label="&folderCheckForNewMessages2.label;"
              accesskey="&folderCheckForNewMessages2.accesskey;"
            />
            <separator class="thin" />
            <hbox>
              <description id="folderRebuildSummaryExplanation" flex="1">
                &folderRebuildSummaryFile.explanation;
              </description>
              <vbox>
                <button
                  id="folderRebuildSummaryButton"
                  label="&folderRebuildSummaryFile2.label;"
                  oncommand="RebuildSummaryInformation(event)"
                  accesskey="&folderRebuildSummaryFile2.accesskey;"
                  tooltiptext="&folderRebuildSummaryFileTip2.label;"
                  align="center"
                />
              </vbox>
            </hbox>
          </vbox>

          <vbox id="RetentionPanel" align="start">
            <description
              id="retention-description"
              data-l10n-id="retention-description"
              hidefor="imap,pop3"
            >
            </description>
            <description
              id="retention-description-imap"
              data-l10n-id="retention-description-imap"
              hidefor="pop3,rss,none,nntp,ews"
            >
            </description>
            <description
              id="retention-description-pop"
              data-l10n-id="retention-description-pop"
              hidefor="imap,rss,none,nntp,ews"
            >
            </description>
            <separator class="thin" />
            <hbox align="center" class="indent">
              <checkbox
                wsm_persist="true"
                id="retention-use-default"
                data-l10n-id="retention-use-default"
                checked=""
                oncommand="onUseDefaultRetentionSettings()"
              />
            </hbox>
            <separator class="thin" />
            <vbox class="indent">
              <radiogroup
                wsm_persist="true"
                id="retention-retain-by"
                aria-labelledby="retention-use-default"
                class="indent"
              >
                <radio
                  wsm_persist="true"
                  id="retention-retain-all"
                  value="1"
                  data-l10n-id="retention-retain-all"
                  oncommand="onCheckKeepMsg()"
                />

                <hbox flex="1" align="center">
                  <radio
                    wsm_persist="true"
                    id="retention-retain-by-num-headers"
                    value="3"
                    data-l10n-id="retention-retain-by-num-headers"
                    oncommand="onCheckKeepMsg()"
                  />
                  <html:input
                    id="retention-num-headers-to-keep"
                    type="number"
                    class="size4 input-inline"
                    min="1"
                    value="2000"
                    wsm_persist="true"
                    aria-labelledby="retention-retain-by-num-headers retention-num-headers-to-keep retention-messages"
                  />
                  <label
                    id="retention-messages"
                    class="retention-unit-label"
                    data-l10n-id="retention-messages"
                    control="retention-num-headers-to-keep"
                  />
                </hbox>
                <hbox flex="1" align="center">
                  <radio
                    wsm_persist="true"
                    id="retention-retain-by-age"
                    value="2"
                    data-l10n-id="retention-retain-by-age"
                    oncommand="onCheckKeepMsg()"
                  />
                  <html:input
                    id="retention-days-to-keep-headers"
                    type="number"
                    class="size4 input-inline"
                    min="1"
                    value="30"
                    wsm_persist="true"
                    aria-labelledby="retention-retain-by-age retention-days-to-keep-headers retention-days-old"
                  />
                  <label
                    id="retention-days-old"
                    class="retention-unit-label"
                    data-l10n-id="retention-days-old"
                    control="retention-days-to-keep-headers"
                  />
                </hbox>
              </radiogroup>
              <separator class="thin" />
              <checkbox
                id="retention-always-keep-starred"
                wsm_persist="true"
                data-l10n-id="retention-always-keep-starred"
                observes="retention-retain-by"
                checked=""
              />
              <separator class="thin" />
              <description
                id="retention-removal-warning"
                data-l10n-id="retention-removal-warning"
                class="indent"
              />
            </vbox>
          </vbox>

          <vbox id="SyncPanel" align="start">
            <vbox>
              <checkbox
                hidefor="nntp"
                wsm_persist="true"
                id="offline.selectForOfflineFolder"
                label="&offlineFolder.check.label;"
                accesskey="&offlineFolder.check.accesskey;"
              />
              <checkbox
                hidefor="imap,ews"
                wsm_persist="true"
                id="offline.selectForOfflineNewsgroup"
                label="&selectofflineNewsgroup.check.label;"
                accesskey="&selectofflineNewsgroup.check.accesskey;"
              />
            </vbox>
            <button
              hidefor="nntp"
              label="&offlineFolder.button.label;"
              oncommand="onOfflineFolderDownload()"
              accesskey="&offlineFolder.button.accesskey;"
              id="offline.offlineFolderDownloadButton"
              orient="right"
            />
            <button
              hidefor="imap,ews"
              label="&offlineNewsgroup.button.label;"
              oncommand="onOfflineFolderDownload()"
              accesskey="&offlineNewsgroup.button.accesskey;"
              id="offline.offlineNewsgroupDownloadButton"
              orient="right"
            />
          </vbox>

          <vbox id="SharingPanel">
            <hbox align="start">
              <label value="&folderType.label;" id="folderTypeLabel" />
              <label value="" id="folderType.text" />
            </hbox>
            <vbox align="start">
              <label value="" id="folderDescription.text" />
              <label value=" " />
              <label
                value="&permissionsDesc.label;"
                id="permissionsDescLabel"
              />

              <description id="folderPermissions.text"></description>
            </vbox>
            <vbox id="folderOtherUsers" align="start" hidden="hidden">
              <label value=" " />
              <label value="&folderOtherUsers.label;" />
              <description id="folderOtherUsersText"></description>
            </vbox>
            <spacer flex="1" />
            <vbox align="start">
              <button
                id="imap.FolderPrivileges"
                hidefor="pop3,none,rss,nntp,ews"
                label="&privileges.button.label;"
                oncommand="onFolderPrivileges()"
                accesskey="&privileges.button.accesskey;"
                orient="right"
              />
            </vbox>
          </vbox>

          <vbox id="quotaPanel">
            <label id="folderQuotaStatus" flex="1" />
            <hbox id="folderQuotaData" hidden="hidden">
              <html:ul id="quotaDetails"></html:ul>
            </hbox>
          </vbox>
        </tabpanels>
      </tabbox>
    </dialog>
  </html:body>
</html>
