[dependencies]
base64 = "^0.21"
bitflags = "1.0"
cfg-if = "1.0"
libc = "0.2"
log = "0.4"
rand = "0.8"
runloop = "0.1.0"
serde_bytes = "0.11"
serde_json = "1.0"
sha2 = "^0.10.0"

[dependencies.aes]
version = "0.8"
optional = true

[dependencies.bytes]
version = "0.5"
features = ["serde"]
optional = true

[dependencies.cbc]
version = "0.1"
features = ["std"]
optional = true
default-features = false

[dependencies.hmac]
version = "0.12"
optional = true

[dependencies.nss-rs]
version = ">=0.12"
git = "https://github.com/mozilla/nss-rs"
optional = true

[dependencies.openssl]
version = "0.10"
optional = true

[dependencies.openssl-sys]
version = "0.9"
optional = true

[dependencies.p256]
version = "0.13"
features = [
    "arithmetic",
    "ecdsa",
    "ecdh",
    "std",
]
optional = true
default-features = false

[dependencies.pkcs11-bindings]
version = "0.1.4"
optional = true

[dependencies.rand_core]
version = "0.6"
features = ["getrandom"]
optional = true

[dependencies.serde]
version = "1.0"
features = ["derive"]

[dependencies.serde_cbor]
version = "0.13"
package = "serde_cbor_2"

[dev-dependencies]
aes-gcm = "0.10"
