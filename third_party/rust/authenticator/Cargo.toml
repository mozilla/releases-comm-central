[target.'cfg(target_os = "windows")'.dependencies]
memoffset = "0.8"

[target.'cfg(target_os = "windows")'.dependencies.winapi]
version = "^0.3"
features = [
    "handleapi",
    "hidclass",
    "hidpi",
    "hidusage",
    "setupapi",
]

