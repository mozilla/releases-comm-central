[features]
binding-recompile = ["bindgen"]
crypto_dummy = []
crypto_nss = [
    "nss-rs",
    "pkcs11-bindings",
]
crypto_openssl = [
    "openssl",
    "openssl-sys",
]
crypto_rust = [
    "aes",
    "cbc",
    "rand_core",
    "p256",
    "hmac",
]
