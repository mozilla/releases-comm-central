name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: mozilla/actions/rust@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11
        with:
          components: llvm-tools
          tools: cargo-llvm-cov
          token: ${{ github.token }}
      - name: Run tests and determine coverage
        run: cargo llvm-cov test --codecov --output-path codecov.json
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          verbose: true
          flags: linux
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]

  rustfmt:
    uses: mozilla/actions/.github/workflows/rustfmt.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  clippy:
    uses: mozilla/actions/.github/workflows/clippy.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  deny:
    uses: mozilla/actions/.github/workflows/deny.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  machete:
    uses: mozilla/actions/.github/workflows/machete.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  semver:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/semver.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  mutants-pr:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/mutants-pr.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: mozilla/actions/.github/workflows/dependency-review.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11

  actionlint:
    uses: mozilla/actions/.github/workflows/actionlint.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub
