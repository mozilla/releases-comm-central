---
loader: taskgraph.loader.transform:loader

kind-dependencies:
    - release-bouncer-check
    - release-update-verify-config

transforms:
    - gecko_taskgraph.transforms.release:run_on_releases
    - taskgraph.transforms.from_deps
    - gecko_taskgraph.transforms.final_verify:transforms
    - gecko_taskgraph.transforms.job:transforms
    - gecko_taskgraph.transforms.task:transforms

tasks:
    final-verify:
        from-deps:
            kinds: [release-update-verify-config]
            group-by:
                # `build_platform` includes `shippable` and `devedition` so
                # this effectively groups by platform+shipping product
                attribute: build_platform
            copy-attributes: true
        description: final verify
        shipping-phase: push
        treeherder:
            symbol: FV
        run-on-repo-type: [hg]
        name: final-verify
        run-on-projects: []  # to make sure this never runs as part of CI
        worker-type: b-linux
        worker:
            docker-image:
                in-tree: "update-verify"
            max-run-time: 7200
